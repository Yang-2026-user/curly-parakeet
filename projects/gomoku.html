<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#c89968" />
<title>五子棋 Gomoku</title>
<style>
  :root {
    --board-bg: #e8b974;
    --panel-bg: rgba(255, 255, 255, 0.92);
    --text-main: #2a1b0a;
    --accent: #b22222;
    --accent-2: #2b5797;
    --shadow: 0 6px 20px rgba(0, 0, 0, 0.2);

    /* 棋盘主题（默认：榧木） */
    --board-a: #efc28a;
    --board-b: #cf9960;
    --board-line: rgba(70, 40, 10, 0.85);
    --board-star: rgba(40, 20, 5, 0.9);
    --board-border: rgba(50, 25, 5, 0.95);
    --page-bg-a: #f5e6c8;
    --page-bg-b: #d9b076;
    --page-bg-c: #b8864b;
  }

  /* 主题：深蓝棋盘 */
  body.theme-blue {
    --board-a: #2a4d6d;
    --board-b: #1a2f44;
    --board-line: rgba(220, 230, 245, 0.82);
    --board-star: rgba(220, 230, 245, 0.9);
    --board-border: rgba(255, 255, 255, 0.85);
    --page-bg-a: #0f1a28;
    --page-bg-b: #16263a;
    --page-bg-c: #0a1220;
  }

  /* 主题：翠绿玉子 */
  body.theme-green {
    --board-a: #b7d9a7;
    --board-b: #7fb583;
    --board-line: rgba(30, 60, 35, 0.85);
    --board-star: rgba(20, 40, 25, 0.9);
    --board-border: rgba(15, 35, 20, 0.95);
    --page-bg-a: #e6f1d8;
    --page-bg-b: #a9c98f;
    --page-bg-c: #6a9a66;
  }

  /* 主题：石墨 */
  body.theme-gray {
    --board-a: #d7d7d7;
    --board-b: #9a9a9a;
    --board-line: rgba(40, 40, 40, 0.9);
    --board-star: rgba(20, 20, 20, 0.95);
    --board-border: rgba(20, 20, 20, 0.95);
    --page-bg-a: #eaeaee;
    --page-bg-b: #bdbdbd;
    --page-bg-c: #7e7e7e;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--text-main);
    background: linear-gradient(135deg, var(--page-bg-a) 0%, var(--page-bg-b) 50%, var(--page-bg-c) 100%);
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.4s ease;
  }

  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 12px;
    min-height: 100vh;
    min-height: 100dvh;
    gap: 14px;
  }

  header.title {
    width: 100%;
    max-width: 760px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 14px;
    background: var(--panel-bg);
    border-radius: 14px;
    box-shadow: var(--shadow);
  }

  header.title h1 {
    margin: 0;
    font-size: 1.25rem;
    letter-spacing: 2px;
    color: var(--accent);
  }

  header.title .sub {
    font-size: 0.78rem;
    color: #6b4a22;
  }

  /* 分组标签 */
  .group-label {
    font-size: 0.8rem;
    font-weight: 600;
    opacity: 0.75;
    margin-right: 6px;
    white-space: nowrap;
  }

  .option-row {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px 14px;
    background: var(--panel-bg);
    border-radius: 14px;
    box-shadow: var(--shadow);
    align-items: center;
  }

  .option-row.row-2 { margin-top: 0; border-top: 1px solid rgba(0,0,0,0.06); border-radius: 0 0 14px 14px; }
  .options-main { border-radius: 14px 14px 0 0; box-shadow: none; position: relative; }

  /* 联机栏：右侧展示房间号/连接状态 */
  .online-info {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 0.85rem;
  }
  .online-info .room-code {
    font-family: "SF Mono", Consolas, monospace;
    letter-spacing: 2px;
    padding: 4px 8px;
    background: rgba(0,0,0,0.06);
    border-radius: 8px;
    color: var(--accent-2);
    font-weight: 600;
    cursor: pointer;
  }
  .online-status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #b0b0b0;
    flex-shrink: 0;
  }
  .online-status-dot.ok { background: #3cba54; box-shadow: 0 0 6px #3cba54; }
  .online-status-dot.err { background: #d9534f; }
  .online-status-dot.pending { background: #f0ad4e; animation: pulse 1s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .icon-btn {
    appearance: none;
    border: 1px solid rgba(0,0,0,0.15);
    background: rgba(255,255,255,0.6);
    padding: 6px 10px;
    font-size: 0.85rem;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text-main);
  }
  .icon-btn.active { background: var(--accent-2); color: #fff; border-color: transparent; }
  .icon-btn:active { transform: translateY(1px); }

  .status-bar {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 14px;
    background: var(--panel-bg);
    border-radius: 14px;
    box-shadow: var(--shadow);
    font-size: 0.95rem;
  }

  .turn {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
  }

  .stone-chip {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    box-shadow: inset -2px -2px 4px rgba(0, 0, 0, 0.35),
      inset 2px 2px 4px rgba(255, 255, 255, 0.35), 0 2px 3px rgba(0, 0, 0, 0.3);
    flex-shrink: 0;
  }

  .stone-black { background: radial-gradient(circle at 35% 30%, #5a5a5a, #000 70%); }
  .stone-white { background: radial-gradient(circle at 35% 30%, #ffffff, #c8c8c8 75%); }

  .info {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 14px;
    font-size: 0.85rem;
    color: #5a3a1b;
    align-items: center;
  }

  .options {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px 14px;
    background: var(--panel-bg);
    border-radius: 14px;
    box-shadow: var(--shadow);
    align-items: center;
  }

  .options label {
    font-size: 0.9rem;
    font-weight: 600;
    margin-right: 4px;
  }

  .seg {
    display: inline-flex;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid rgba(43, 87, 151, 0.35);
    background: #fff;
  }

  .seg button {
    appearance: none;
    border: none;
    padding: 8px 14px;
    background: transparent;
    font-size: 0.88rem;
    color: #2b5797;
    cursor: pointer;
    border-right: 1px solid rgba(43, 87, 151, 0.2);
    white-space: nowrap;
  }
  .seg button:last-child { border-right: none; }
  .seg button.active {
    background: linear-gradient(180deg, #2b5797, #1e3f70);
    color: #fff;
  }

  .seg.warn { border-color: rgba(178, 34, 34, 0.4); }
  .seg.warn button { color: #b22222; }
  .seg.warn button.active { background: linear-gradient(180deg, #b22222, #8b1a1a); color: #fff; }

  .board-wrap {
    width: 100%;
    max-width: 760px;
    aspect-ratio: 1 / 1;
    background: var(--board-bg);
    border-radius: 14px;
    box-shadow: var(--shadow), inset 0 0 0 6px #b48150;
    position: relative;
    touch-action: manipulation;
    user-select: none;
  }

  #board {
    width: 100%;
    height: 100%;
    display: block;
  }

  .controls {
    width: 100%;
    max-width: 760px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  button.btn {
    appearance: none;
    border: none;
    padding: 12px 18px;
    min-width: 110px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(180deg, #2b5797, #1e3f70);
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(43, 87, 151, 0.35);
    transition: transform 0.08s ease, box-shadow 0.15s ease, opacity 0.15s;
  }
  button.btn.danger { background: linear-gradient(180deg, #b22222, #8b1a1a); box-shadow: 0 4px 10px rgba(178, 34, 34, 0.35); }
  button.btn.ghost { background: linear-gradient(180deg, #6b4a22, #4a3214); box-shadow: 0 4px 10px rgba(107, 74, 34, 0.35); }

  button.btn:active { transform: translateY(1px); }
  button.btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .overlay.show { display: flex; }

  .dialog {
    background: #fffaf0;
    border-radius: 16px;
    padding: 22px 24px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }
  .dialog h2 { margin: 0 0 8px; color: var(--accent); }
  .dialog p { margin: 6px 0 18px; color: #5a3a1b; white-space: pre-line; }

  .dialog .dialog-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  footer {
    font-size: 0.78rem;
    color: #3a2810;
    opacity: 0.8;
    text-align: center;
    padding: 4px 0 14px;
  }

  @media (min-width: 720px) {
    header.title h1 { font-size: 1.6rem; }
    .status-bar, .options { font-size: 1rem; }
    button.btn { min-width: 140px; padding: 14px 22px; font-size: 1rem; }
  }

  @media (max-width: 480px) {
    header.title h1 { font-size: 1.05rem; letter-spacing: 1px; }
    header.title .sub { display: none; }
    .info { font-size: 0.78rem; gap: 10px; }
    .options { padding: 10px; }
    .options label { font-size: 0.82rem; }
    .seg button { padding: 7px 10px; font-size: 0.82rem; }
    button.btn { min-width: 0; flex: 1 1 30%; padding: 12px 10px; font-size: 0.9rem; }
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --panel-bg: rgba(30, 22, 14, 0.92);
      --text-main: #f5e6c8;
    }
    html, body { color: var(--text-main); }
    body:not(.theme-blue):not(.theme-green):not(.theme-gray) {
      background: linear-gradient(135deg, #2a1b0a, #4a3214, #2a1b0a);
    }
    header.title, .status-bar, .option-row { background: var(--panel-bg); color: var(--text-main); }
    header.title .sub, .info, footer { color: #d9b076; }
    .dialog { background: #2a1b0a; color: var(--text-main); }
    .dialog p { color: #d9b076; }
    .seg { background: #1a1108; }
    .seg button { color: #8bb3ff; }
    .seg.warn button { color: #ff9a9a; }
    .icon-btn { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: var(--text-main); }
    .online-info .room-code { background: rgba(255,255,255,0.08); color: #8bb3ff; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="title">
    <h1>五 子 棋</h1>
    <span class="sub">Gomoku · 15×15</span>
  </header>

  <!-- 第一行：模式 / 执子 / 难度（执子与难度仅在人机/联机下显示） -->
  <div class="option-row options-main" style="box-shadow: var(--shadow); border-radius: 14px 14px 0 0;">
    <span class="group-label">模式</span>
    <div class="seg" id="modeSeg">
      <button data-val="pvp" class="active">双人</button>
      <button data-val="ai">人机</button>
      <button data-val="online">联机</button>
    </div>

    <span class="group-label" id="sideLabel" style="display:none;">执子</span>
    <div class="seg" id="sideSeg" style="display:none;">
      <button data-val="black" class="active">我执黑</button>
      <button data-val="white">我执白</button>
    </div>

    <span class="group-label" id="diffLabel" style="display:none;">AI</span>
    <div class="seg warn" id="diffSeg" style="display:none;">
      <button data-val="easy">简单</button>
      <button data-val="normal" class="active">普通</button>
      <button data-val="hard">困难</button>
    </div>
  </div>

  <!-- 第二行：主题 / 音效 / 联机操作 -->
  <div class="option-row row-2" style="box-shadow: var(--shadow); border-radius: 0 0 14px 14px; margin-top: -12px;">
    <span class="group-label">主题</span>
    <div class="seg" id="themeSeg">
      <button data-val="wood" class="active">榧木</button>
      <button data-val="blue">深蓝</button>
      <button data-val="green">翠绿</button>
      <button data-val="gray">石墨</button>
    </div>

    <button class="icon-btn" id="btnSound" title="音效开关">🔊 音效</button>

    <!-- 联机操作按钮组 -->
    <span class="group-label" id="onlineLabel" style="display:none;">联机</span>
    <button class="icon-btn" id="btnCreateRoom" style="display:none;">创建房间</button>
    <button class="icon-btn" id="btnJoinRoom" style="display:none;">加入房间</button>
    <button class="icon-btn" id="btnLeaveRoom" style="display:none;">离开房间</button>

    <div class="online-info" id="onlineInfo" style="display:none;">
      <span class="online-status-dot" id="onlineDot"></span>
      <span id="onlineStatus">未连接</span>
      <span class="room-code" id="roomCode" title="点击复制">------</span>
    </div>
  </div>

  <div class="status-bar">
    <div class="turn" id="turnBox">
      <div class="stone-chip stone-black" id="turnChip"></div>
      <span id="turnText">黑方落子</span>
    </div>
    <div class="info">
      <span id="moveCount">第 0 手</span>
      <span>·</span>
      <span id="modeText">模式：双人对战</span>
    </div>
  </div>

  <div class="board-wrap" id="boardWrap">
    <canvas id="board"></canvas>
  </div>

  <div class="controls">
    <button class="btn ghost" id="btnUndo">悔棋</button>
    <button class="btn" id="btnRestart">重新开始</button>
  </div>

  <footer>点击或触摸落子 · 先连成五子者获胜 · 人机对战支持多档AI</footer>
</div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <h2 id="dlgTitle">游戏结束</h2>
    <p id="dlgMsg">黑方获胜！</p>
    <div class="dialog-btns">
      <button class="btn" id="dlgPrimary">确定</button>
      <button class="btn ghost" id="dlgSecondary" style="display:none;">取消</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ============== 常量 ==============
  const BOARD_SIZE = 15;
  const EMPTY = 0;
  const BLACK = 1;
  const WHITE = 2;
  const WIN_COUNT = 5;
  const DIRS = [[0, 1], [1, 0], [1, 1], [1, -1]];
  const OPP = (p) => (p === BLACK ? WHITE : (p === WHITE ? BLACK : EMPTY));

  // ============== 游戏状态 ==============
  let board = createBoard();
  let history = [];
  let currentPlayer = BLACK;
  let gameOver = false;
  let winLine = null;
  let lastMove = null;
  let aiBusy = false;
  let aiTimer = null;

  let gameMode = 'pvp';        // 'pvp' | 'ai' | 'online'
  let humanSide = BLACK;
  let aiDifficulty = 'normal';
  let currentTheme = 'wood';
  let pendingUndoFromPeer = false;

  // ============== DOM ==============
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const boardWrap = document.getElementById('boardWrap');
  const turnText = document.getElementById('turnText');
  const turnChip = document.getElementById('turnChip');
  const moveCountEl = document.getElementById('moveCount');
  const modeTextEl = document.getElementById('modeText');
  const overlay = document.getElementById('overlay');
  const dlgTitle = document.getElementById('dlgTitle');
  const dlgMsg = document.getElementById('dlgMsg');
  const dlgPrimary = document.getElementById('dlgPrimary');
  const dlgSecondary = document.getElementById('dlgSecondary');

  const sideSeg = document.getElementById('sideSeg');
  const sideLabel = document.getElementById('sideLabel');
  const diffSeg = document.getElementById('diffSeg');
  const diffLabel = document.getElementById('diffLabel');
  const onlineLabel = document.getElementById('onlineLabel');
  const btnSound = document.getElementById('btnSound');
  const btnCreateRoom = document.getElementById('btnCreateRoom');
  const btnJoinRoom = document.getElementById('btnJoinRoom');
  const btnLeaveRoom = document.getElementById('btnLeaveRoom');
  const roomCodeEl = document.getElementById('roomCode');

  document.getElementById('btnUndo').addEventListener('click', onUndoClick);
  document.getElementById('btnRestart').addEventListener('click', () => {
    confirmDialog('确定重新开始本局？', '当前所有落子将被清空。', () => {
      restart();
    }, true);
  });

  // ============== 模式可见性控制 ==============
  function refreshModeUI() {
    const isAI = gameMode === 'ai';
    const isOnline = gameMode === 'online';
    sideSeg.style.display = isAI ? '' : 'none';
    sideLabel.style.display = isAI ? '' : 'none';
    diffSeg.style.display = isAI ? '' : 'none';
    diffLabel.style.display = isAI ? '' : 'none';
    // 联机控件：只有联机模式下可见
    const showOnline = isOnline ? '' : 'none';
    const onlineInfo = document.getElementById('onlineInfo');
    if (onlineInfo) onlineInfo.style.display = showOnline;
    if (btnCreateRoom) btnCreateRoom.style.display = showOnline;
    if (btnJoinRoom) btnJoinRoom.style.display = showOnline;
    if (btnLeaveRoom) btnLeaveRoom.style.display = showOnline;
    if (onlineLabel) onlineLabel.style.display = showOnline;
  }

  function setupSeg(id, handler, needsConfirm) {
    const seg = document.getElementById(id);
    if (!seg) return;
    const btns = seg.querySelectorAll('button');
    btns.forEach((btn) => {
      btn.addEventListener('click', () => {
        const val = btn.dataset.val;
        if (btn.classList.contains('active')) return;
        const doSwitch = () => {
          btns.forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          handler(val);
        };
        if (needsConfirm && history.length > 0) {
          confirmDialog('切换选项将重新开始本局', '当前所有落子将被清空。', () => {
            doSwitch();
            hideOverlay();
          }, true);
        } else {
          doSwitch();
        }
      });
    });
  }

  setupSeg('modeSeg', (val) => {
    gameMode = val;
    refreshModeUI();
    restart();
    hideOverlay();
  }, true);
  setupSeg('sideSeg', (val) => { humanSide = val === 'black' ? BLACK : WHITE; restart(); }, false);
  setupSeg('diffSeg', (val) => { aiDifficulty = val; restart(); }, false);
  setupSeg('themeSeg', (val) => { applyTheme(val); }, false);

  // ============== 主题切换 ==============
  function applyTheme(name) {
    currentTheme = name;
    document.body.classList.remove('theme-wood', 'theme-blue', 'theme-green', 'theme-gray');
    if (name !== 'wood') document.body.classList.add('theme-' + name);
    draw();
  }

  // ============== 音效（Web Audio 合成）==============
  const Sound = (function () {
    let enabled = true;
    let ctx = null;
    function ensure() {
      if (!ctx) {
        try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { ctx = null; }
      }
      if (ctx && ctx.state === 'suspended') ctx.resume();
      return ctx;
    }
    function tone(freq, dur, type, volume, delay) {
      if (!enabled) return;
      const c = ensure(); if (!c) return;
      const t0 = c.currentTime + (delay || 0);
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, t0);
      gain.gain.setValueAtTime(0, t0);
      gain.gain.linearRampToValueAtTime(volume || 0.15, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(gain).connect(c.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    }
    function noiseBurst(dur, volume) {
      if (!enabled) return;
      const c = ensure(); if (!c) return;
      const bufferSize = Math.floor(c.sampleRate * dur);
      const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
      const src = c.createBufferSource();
      src.buffer = buffer;
      const gain = c.createGain();
      gain.gain.value = volume || 0.25;
      const filter = c.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 900;
      src.connect(filter).connect(gain).connect(c.destination);
      src.start();
    }
    return {
      toggle: () => { enabled = !enabled; return enabled; },
      stone: () => { noiseBurst(0.08, 0.35); tone(260, 0.12, 'triangle', 0.15, 0); },
      win: () => { [523, 659, 784, 1046].forEach((f, i) => tone(f, 0.25, 'triangle', 0.22, i * 0.12)); },
      lose: () => { [330, 262, 196].forEach((f, i) => tone(f, 0.3, 'sine', 0.2, i * 0.14)); },
      click: () => tone(880, 0.05, 'square', 0.08),
      notify: () => { [660, 880].forEach((f, i) => tone(f, 0.08, 'sine', 0.15, i * 0.08)); }
    };
  })();

  btnSound.addEventListener('click', () => {
    const on = Sound.toggle();
    btnSound.textContent = on ? '🔊 音效' : '🔇 静音';
  });

  // ============== 联机模块（基于 BroadcastChannel，同浏览器/同网络跨标签直连）==============
  const online = (function () {
    let channel = null;
    let myRoom = null;
    let joined = false;
    let peerSide = null;

    function genCode() {
      const alpha = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
      let s = ''; for (let i = 0; i < 6; i++) s += alpha.charAt(Math.floor(Math.random() * alpha.length));
      return s;
    }
    function ensureChannel() {
      if (channel) return channel;
      try {
        channel = new BroadcastChannel('gomoku-room');
        channel.onmessage = (ev) => {
          const data = ev.data && typeof ev.data === 'object' ? ev.data : {};
          if (!data.room || data.room !== myRoom) return;
          if (data.from === 'self') return;
          handleRemoteMessage(data);
        };
      } catch (e) { channel = null; }
      return channel;
    }
    function post(data) { data.room = myRoom; data.from = 'peer'; try { if (channel) channel.postMessage(data); } catch (e) {} }

    function handleRemoteMessage(data) {
      if (data.type === 'hello') {
        peerSide = data.side || OPP(humanSide);
        setOnlineStatus('connected');
        if (roomCodeEl) roomCodeEl.textContent = myRoom;
        Sound.notify();
        showOverlay('对手已加入', '对方执' + (peerSide === BLACK ? '黑' : '白') + '，对战开始。',
          [{ text: '开始对局', cls: '', onClick: () => { hideOverlay(); restart(); } }], false);
        post({ type: 'ack', side: humanSide });
      } else if (data.type === 'ack') {
        peerSide = data.side || OPP(humanSide);
        setOnlineStatus('connected');
        Sound.notify();
      } else if (data.type === 'move') {
        const side = data.side || peerSide || OPP(humanSide);
        if (!gameOver && board[data.row][data.col] === EMPTY && side === currentPlayer) {
          placeStone(data.row, data.col, side, false);
        }
      } else if (data.type === 'undo-request') {
        // 对方请求悔棋
        confirmDialog('对方请求悔棋', '是否同意回退一手？', () => {
          post({ type: 'undo-grant' });
          undoOne();
          hideOverlay();
        }, true);
        // 如果点击取消，则发送 deny
        if (dlgSecondary) {
          const originalHandler = dlgSecondary.onclick;
          dlgSecondary.onclick = () => {
            post({ type: 'undo-deny' });
            hideOverlay();
            if (originalHandler) dlgSecondary.onclick = originalHandler;
          };
        }
      } else if (data.type === 'undo-grant') {
        undoOne();
        Sound.click();
      } else if (data.type === 'undo-deny') {
        showOverlay('对方拒绝悔棋', '对手不同意回退。',
          [{ text: '好的', cls: '', onClick: () => hideOverlay() }], false);
      } else if (data.type === 'restart-request') {
        confirmDialog('对方请求重开', '对方希望开启新一局。', () => {
          post({ type: 'restart-grant' }); hideOverlay(); restart();
        }, true);
      } else if (data.type === 'restart-grant') {
        restart();
      } else if (data.type === 'leave') {
        setOnlineStatus('disconnected');
        peerSide = null;
        showOverlay('对手已离开', '对方已离开房间。', [{ text: '确定', cls: '', onClick: () => hideOverlay() }], false);
      }
    }

    function createRoom() {
      ensureChannel();
      myRoom = genCode(); joined = true; peerSide = null;
      setOnlineStatus('waiting');
      if (roomCodeEl) roomCodeEl.textContent = myRoom;
      showOverlay('创建房间成功', '房间码：' + myRoom + '\n请将房间码告诉对手。对方打开此页面，选择联机 -> 加入房间 -> 输入该房间码。',
        [{ text: '好的', cls: '', onClick: () => hideOverlay() }], false);
    }
    function promptJoin() {
      setTimeout(() => {
        const code = window.prompt('请输入 6 位房间码：');
        if (!code) return;
        const up = code.trim().toUpperCase();
        if (up.length !== 6) { alert('房间码必须为 6 位。'); return; }
        ensureChannel(); myRoom = up; joined = true; peerSide = null;
        if (roomCodeEl) roomCodeEl.textContent = myRoom;
        setOnlineStatus('pending');
        post({ type: 'hello', side: humanSide });
      }, 80);
    }
    function leaveRoom() {
      if (joined && channel) post({ type: 'leave' });
      joined = false; myRoom = null; peerSide = null;
      if (roomCodeEl) roomCodeEl.textContent = '------';
      setOnlineStatus('idle');
    }
    function close() { leaveRoom(); }
    function isConnected() { return joined && peerSide !== null; }
    function getRoom() { return myRoom; }
    function sendMove(r, c, side) { post({ type: 'move', row: r, col: c, side }); }
    function sendUndoRequest() { post({ type: 'undo-request' }); }
    function sendRestartRequest() { post({ type: 'restart-request' }); }
    return { createRoom, promptJoin, leaveRoom, close, isConnected, getRoom, sendMove, sendUndoRequest, sendRestartRequest };
  })();

  function setOnlineStatus(state) {
    const dot = document.getElementById('onlineDot');
    const status = document.getElementById('onlineStatus');
    if (dot) {
      dot.classList.remove('ok', 'err', 'pending');
      if (state === 'waiting' || state === 'pending') dot.classList.add('pending');
      else if (state === 'connected') dot.classList.add('ok');
      else if (state === 'disconnected') dot.classList.add('err');
    }
    if (status) {
      if (state === 'waiting') status.textContent = '等待对手加入…';
      else if (state === 'pending') status.textContent = '连接中…';
      else if (state === 'connected') status.textContent = '已连接';
      else if (state === 'disconnected') status.textContent = '对手已离开';
      else status.textContent = '未连接';
    }
  }

  // 在线按钮事件（DOM 引用在顶部已有声明，这里仅绑定）
  if (btnCreateRoom) btnCreateRoom.addEventListener('click', () => { online.createRoom(); Sound.click(); });
  if (btnJoinRoom) btnJoinRoom.addEventListener('click', () => { online.promptJoin(); Sound.click(); });
  if (btnLeaveRoom) btnLeaveRoom.addEventListener('click', () => { online.leaveRoom(); Sound.click(); });
  if (roomCodeEl) roomCodeEl.addEventListener('click', () => {
    const code = online.getRoom();
    if (!code) return;
    try { navigator.clipboard.writeText(code); } catch (e) {}
    const old = roomCodeEl.textContent;
    roomCodeEl.textContent = '已复制';
    setTimeout(() => { roomCodeEl.textContent = old; }, 900);
  });

  // ============== 画板尺寸 ==============
  let cell = 0;
  let padding = 0;
  let dpr = 1;

  function setupCanvas() {
    const rect = boardWrap.getBoundingClientRect();
    dpr = window.devicePixelRatio || 1;
    const logicalSize = Math.floor(Math.min(rect.width, rect.height));
    padding = Math.round(logicalSize / (BOARD_SIZE - 1 + 1.6) * 0.8);
    cell = (logicalSize - padding * 2) / (BOARD_SIZE - 1);
    canvas.style.width = logicalSize + 'px';
    canvas.style.height = logicalSize + 'px';
    canvas.width = Math.floor(logicalSize * dpr);
    canvas.height = Math.floor(logicalSize * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  window.addEventListener('resize', setupCanvas);
  window.addEventListener('orientationchange', () => setTimeout(setupCanvas, 120));

  // ============== 事件：落子 ==============
  canvas.addEventListener('click', onTap, { passive: true });
  canvas.addEventListener('touchend', function (e) {
    if (e.changedTouches && e.changedTouches.length > 0) {
      const t = e.changedTouches[0];
      handlePointAt(t.clientX, t.clientY);
      e.preventDefault();
    }
  }, { passive: false });

  function onTap(e) { handlePointAt(e.clientX, e.clientY); }

  function handlePointAt(clientX, clientY) {
    if (gameOver || aiBusy) return;
    if (gameMode === 'ai' && currentPlayer !== humanSide) return;
    if (gameMode === 'online') {
      if (!online.isConnected()) return;
      if (currentPlayer !== humanSide) return;
    }
    const rect = canvas.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    if (x < 0 || y < 0 || x > rect.width || y > rect.height) return;
    let col = Math.round((x - padding) / cell);
    let row = Math.round((y - padding) / cell);
    if (row < 0) row = 0; if (row >= BOARD_SIZE) row = BOARD_SIZE - 1;
    if (col < 0) col = 0; if (col >= BOARD_SIZE) col = BOARD_SIZE - 1;
    if (board[row][col] !== EMPTY) return;
    placeStone(row, col, currentPlayer, true);
    if (gameMode === 'online') online.sendMove(row, col, currentPlayer);
  }

  // ============== 核心：落子 ==============
  function placeStone(row, col, player, byHuman) {
    board[row][col] = player;
    history.push({ row, col, player, byHuman: !!byHuman });
    lastMove = { row, col };
    Sound.stone();

    const line = checkWin(row, col, player);
    if (line) {
      winLine = line;
      endGame(player);
      return;
    }
    if (history.length === BOARD_SIZE * BOARD_SIZE) {
      endGame(null);
      return;
    }
    currentPlayer = OPP(player);
    updateStatus(); draw();
    if (gameMode === 'ai' && currentPlayer !== humanSide && !gameOver) scheduleAIMove();
  }

  function endGame(winner) {
    gameOver = true; draw(); updateStatus();
    if (winner === null) {
      showOverlay('和棋', '棋盘已满，双方未分胜负。',
        [{ text: '再来一局', cls: '', onClick: () => { restart(); hideOverlay(); } }], true);
      return;
    }
    const who = winner === BLACK ? '黑方' : '白方';
    if (gameMode === 'ai') { winner === humanSide ? Sound.win() : Sound.lose(); }
    else if (gameMode === 'online') { winner === humanSide ? Sound.win() : Sound.lose(); }
    else Sound.win();
    showOverlay(who + '获胜', who + '率先连成五子，恭喜！',
      [{ text: '再来一局', cls: '', onClick: () => { restart(); hideOverlay(); } }], true);
  }

  function scheduleAIMove() {
    if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; }
    aiBusy = true; updateStatus();
    aiTimer = setTimeout(() => {
      aiTimer = null;
      try {
        const move = computeAIMove(aiDifficulty, currentPlayer);
        if (move) placeStone(move.row, move.col, currentPlayer, false);
      } catch (err) { console.error(err); }
      finally { aiBusy = false; updateStatus(); draw(); }
    }, aiDifficulty === 'hard' ? 200 : 120);
  }

  function clearAITimer() {
    if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; }
  }

  // ============== 胜负判定 ==============
  function checkWin(r, c, player) {
    for (const [dr, dc] of DIRS) {
      let count = 1;
      let r1 = r, c1 = c, r2 = r, c2 = c;
      let nr = r + dr, nc = c + dc;
      while (inRange(nr, nc) && board[nr][nc] === player) { count++; r2 = nr; c2 = nc; nr += dr; nc += dc; }
      nr = r - dr; nc = c - dc;
      while (inRange(nr, nc) && board[nr][nc] === player) { count++; r1 = nr; c1 = nc; nr -= dr; nc -= dc; }
      if (count >= WIN_COUNT) return { r1, c1, r2, c2 };
    }
    return null;
  }

  // ============== 工具 ==============
  function inRange(r, c) { return r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE; }
  function createBoard() {
    const b = new Array(BOARD_SIZE);
    for (let i = 0; i < BOARD_SIZE; i++) b[i] = new Array(BOARD_SIZE).fill(EMPTY);
    return b;
  }

  function updateStatus() {
    if (gameOver) turnText.textContent = '本局结束';
    else if (gameMode === 'ai' && currentPlayer !== humanSide)
      turnText.textContent = aiBusy ? 'AI思考中…' : (currentPlayer === BLACK ? 'AI(黑)落子' : 'AI(白)落子');
    else if (gameMode === 'ai')
      turnText.textContent = (currentPlayer === BLACK ? '你(黑)' : '你(白)') + '落子';
    else if (gameMode === 'online') {
      if (currentPlayer === humanSide) turnText.textContent = (humanSide === BLACK ? '你(黑)' : '你(白)') + '落子';
      else turnText.textContent = (currentPlayer === BLACK ? '对手(黑)' : '对手(白)') + '落子';
    } else turnText.textContent = (currentPlayer === BLACK ? '黑方' : '白方') + '落子';
    turnChip.className = 'stone-chip ' + (currentPlayer === BLACK ? 'stone-black' : 'stone-white');
    moveCountEl.textContent = '第 ' + history.length + ' 手';
    let modeStr = '';
    if (gameMode === 'pvp') modeStr = '模式：双人对战';
    else if (gameMode === 'ai') modeStr = '模式：人机 · ' + (humanSide === BLACK ? '我执黑' : '我执白') + ' · ' +
      ({ easy: '简单', normal: '普通', hard: '困难' }[aiDifficulty]);
    else modeStr = '模式：联机 · ' + (humanSide === BLACK ? '我执黑' : '我执白');
    modeTextEl.textContent = modeStr;
  }

  // ============== 通用对话框 ==============
  function showOverlay(title, msg, buttons, showClose) {
    dlgTitle.textContent = title;
    dlgMsg.textContent = msg;
    dlgPrimary.style.display = 'none';
    dlgSecondary.style.display = 'none';
    dlgPrimary.onclick = null;
    dlgSecondary.onclick = null;
    dlgPrimary.className = 'btn';
    dlgSecondary.className = 'btn ghost';
    if (buttons && buttons.length > 0) {
      const primary = buttons[0];
      dlgPrimary.textContent = primary.text || '确定';
      dlgPrimary.className = 'btn ' + (primary.cls === 'danger' ? 'danger' : '');
      dlgPrimary.style.display = '';
      dlgPrimary.onclick = () => { primary.onClick && primary.onClick(); };
      if (buttons[1]) {
        const secondary = buttons[1];
        dlgSecondary.textContent = secondary.text || '取消';
        dlgSecondary.className = 'btn ghost' + (secondary.cls === 'danger' ? ' danger' : '');
        dlgSecondary.style.display = '';
        dlgSecondary.onclick = () => { secondary.onClick && secondary.onClick(); };
      }
    } else if (showClose) {
      dlgPrimary.textContent = '关闭';
      dlgPrimary.style.display = '';
      dlgPrimary.onclick = () => hideOverlay();
    }
    overlay.classList.add('show');
  }

  function hideOverlay() { overlay.classList.remove('show'); }

  function confirmDialog(title, msg, onOk, withCancel) {
    const buttons = [{ text: '确定', cls: '', onClick: onOk }];
    if (withCancel) buttons.push({ text: '取消', cls: 'ghost', onClick: () => hideOverlay() });
    showOverlay(title, msg, buttons, false);
  }

  // ============== 悔棋处理 ==============
  function onUndoClick() {
    if (history.length === 0 && !gameOver) return;
    if (gameMode === 'online') {
      if (!online.isConnected()) return;
      online.sendUndoRequest();
      showOverlay('等待对方回应', '已向对手发送悔棋请求。', [{ text: '好的', cls: '', onClick: () => hideOverlay() }], false);
      return;
    }
    if (gameOver) {
      confirmDialog('本局已结束', '要悔棋回退一步继续对局吗？', () => { hideOverlay(); performUndoFlow(); }, true);
      return;
    }
    performUndoFlow();
  }

  function performUndoFlow() {
    if (gameMode === 'pvp') {
      confirmDialog('确认悔棋', '将回退到上一手落子之前。', () => { undoOne(); hideOverlay(); }, true);
    } else if (gameMode === 'ai') {
      if (aiDifficulty === 'easy') { undoToHumanTurn(); return; }
      const verdict = aiJudgeUndo();
      if (verdict.agree) {
        confirmDialog('AI 同意悔棋', verdict.reason, () => { undoToHumanTurn(); hideOverlay(); }, true);
      } else {
        confirmDialog('AI 拒绝悔棋', verdict.reason, () => hideOverlay(), false);
        dlgSecondary.style.display = 'none';
      }
    }
  }

  function undoOne() {
    if (history.length === 0) return;
    const last = history.pop();
    board[last.row][last.col] = EMPTY;
    currentPlayer = last.player;
    gameOver = false; winLine = null;
    lastMove = history.length > 0 ? { row: history[history.length - 1].row, col: history[history.length - 1].col } : null;
    updateStatus(); draw();
  }

  function undoToHumanTurn() {
    if (history.length === 0) return;
    const lastPlayer = history[history.length - 1].player;
    if (lastPlayer !== humanSide && history.length > 0) undoOne();
    if (history.length > 0 && history[history.length - 1].player === humanSide) undoOne();
  }

  function aiJudgeUndo() {
    const aiSide = OPP(humanSide);
    const score = evaluateBoardFor(aiSide);
    const threshold = aiDifficulty === 'hard' ? -200 : 200;
    if (score > threshold + 800) return { agree: false, reason: 'AI 局势大好，拒绝悔棋。' };
    if (score > threshold + 200) return { agree: false, reason: 'AI 局面占优，不愿悔棋。' };
    if (score > threshold) return { agree: false, reason: 'AI 稍占优势，不同意悔棋。' };
    if (score > threshold - 400) return { agree: true, reason: 'AI 认为局面胶着，同意悔棋。' };
    return { agree: true, reason: 'AI 认为自身局面不利，同意悔棋。' };
  }

  // ============== AI 核心 ==============
  function computeAIMove(difficulty, player) {
    if (history.length === 0) {
      // 空棋盘：直接下在天元附近
      return { row: 7, col: 7 };
    }

    if (difficulty === 'easy') {
      return aiEasy(player);
    }
    if (difficulty === 'normal') {
      return aiNormal(player);
    }
    return aiHard(player);
  }

  // ---- 候选点生成：在已有棋子 2 格范围内的空位 ----
  function generateCandidates(radius) {
    const seen = new Set();
    const result = [];
    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (board[r][c] === EMPTY) continue;
        for (let dr = -radius; dr <= radius; dr++) {
          for (let dc = -radius; dc <= radius; dc++) {
            const nr = r + dr, nc = c + dc;
            if (!inRange(nr, nc)) continue;
            if (board[nr][nc] !== EMPTY) continue;
            const key = nr * BOARD_SIZE + nc;
            if (seen.has(key)) continue;
            seen.add(key);
            result.push({ row: nr, col: nc });
          }
        }
      }
    }
    if (result.length === 0) {
      // 回退：所有空位
      for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
          if (board[r][c] === EMPTY) result.push({ row: r, col: c });
        }
      }
    }
    return result;
  }

  // ---- 简单 AI：候选点中随机，但优先堵对手五连/自己连五 ----
  function aiEasy(player) {
    const opp = OPP(player);
    const cands = generateCandidates(1);
    // 1) 能直接连五就下
    for (const m of cands) {
      if (isImmediateWin(m.row, m.col, player)) return m;
    }
    // 2) 阻挡对手连五
    for (const m of cands) {
      if (isImmediateWin(m.row, m.col, opp)) return m;
    }
    // 3) 随机选择前若干个较好候选（用启发式粗筛 topN 后随机）
    const scored = cands.map((m) => ({
      m,
      s: scorePoint(m.row, m.col, player) + scorePoint(m.row, m.col, opp) * 0.8,
    }));
    scored.sort((a, b) => b.s - a.s);
    const top = scored.slice(0, Math.min(6, scored.length));
    return top[Math.floor(Math.random() * top.length)].m;
  }

  // ---- 普通 AI：一步前瞻（对每个候选点评估"己方得分+对手威胁"）----
  function aiNormal(player) {
    const opp = OPP(player);
    const cands = generateCandidates(2);
    // 启发式粗筛取前 15
    const pre = cands.map((m) => ({
      m,
      s: scorePoint(m.row, m.col, player) + scorePoint(m.row, m.col, opp),
    }));
    pre.sort((a, b) => b.s - a.s);
    const shortlist = pre.slice(0, 15);

    let bestScore = -Infinity;
    let bestMoves = [];
    for (const item of shortlist) {
      const { m } = item;
      board[m.row][m.col] = player;
      const myScore = evaluateBoardFor(player);
      board[m.row][m.col] = EMPTY;

      board[m.row][m.col] = opp;
      const oppScore = evaluateBoardFor(opp);
      board[m.row][m.col] = EMPTY;

      // 综合：略微偏向进攻，但防守也必须重视
      const s = myScore * 1.0 + oppScore * 0.9;
      if (s > bestScore) {
        bestScore = s;
        bestMoves = [m];
      } else if (s === bestScore) {
        bestMoves.push(m);
      }
    }
    if (bestMoves.length === 0) return cands[0];
    return bestMoves[Math.floor(Math.random() * bestMoves.length)];
  }

  // ---- 困难 AI：Minimax + Alpha-Beta，深度 2（己方+对手各一步） ----
  function aiHard(player) {
    // 先检查立即胜负
    const opp = OPP(player);
    const cands = generateCandidates(2);
    for (const m of cands) if (isImmediateWin(m.row, m.col, player)) return m;
    for (const m of cands) if (isImmediateWin(m.row, m.col, opp)) return m;

    // 预评分取前 10 作为第一层候选
    const pre = cands.map((m) => ({
      m,
      s: scorePoint(m.row, m.col, player) + scorePoint(m.row, m.col, opp),
    }));
    pre.sort((a, b) => b.s - a.s);
    const topLevel = pre.slice(0, 10);

    let bestScore = -Infinity;
    let bestMove = topLevel[0].m;
    const searchDepth = 4;
    for (const item of topLevel) {
      const m = item.m;
      board[m.row][m.col] = player;
      if (checkWin(m.row, m.col, player)) {
        board[m.row][m.col] = EMPTY;
        return m;
      }
      const score = minimax(searchDepth - 1, -Infinity, Infinity, false, player);
      board[m.row][m.col] = EMPTY;
      if (score > bestScore) {
        bestScore = score;
        bestMove = m;
      }
    }
    return bestMove;
  }

  function minimax(depth, alpha, beta, isMax, aiPlayer) {
    const opp = OPP(aiPlayer);

    // 搜索到 leaf 或发现胜负则评估
    if (depth === 0) {
      return evaluateBoardFor(aiPlayer);
    }

    // 判断是否已有一方能取胜：若上一手直接造成五连，则返回一个极端值
    // （这里简化：直接按盘面评估，若出现五连 evaluateBoardFor 会返回大值）

    const side = isMax ? aiPlayer : opp;
    const cands = generateCandidates(2);
    const pre = cands.map((m) => ({
      m,
      s: scorePoint(m.row, m.col, side) + scorePoint(m.row, m.col, OPP(side)),
    }));
    pre.sort((a, b) => b.s - a.s);
    const shortlist = pre.slice(0, 8);

    if (isMax) {
      let value = -Infinity;
      for (const item of shortlist) {
        const m = item.m;
        board[m.row][m.col] = side;
        // 若能直接五连，直接返回巨大分数（尽早剪枝）
        if (checkWin(m.row, m.col, side)) {
          board[m.row][m.col] = EMPTY;
          return 1e9 + depth;
        }
        const v = minimax(depth - 1, alpha, beta, false, aiPlayer);
        board[m.row][m.col] = EMPTY;
        if (v > value) value = v;
        if (value > alpha) alpha = value;
        if (alpha >= beta) break;
      }
      return value;
    } else {
      let value = Infinity;
      for (const item of shortlist) {
        const m = item.m;
        board[m.row][m.col] = side;
        if (checkWin(m.row, m.col, side)) {
          board[m.row][m.col] = EMPTY;
          return -1e9 - depth;
        }
        const v = minimax(depth - 1, alpha, beta, true, aiPlayer);
        board[m.row][m.col] = EMPTY;
        if (v < value) value = v;
        if (value < beta) beta = value;
        if (alpha >= beta) break;
      }
      return value;
    }
  }

  function isImmediateWin(r, c, player) {
    board[r][c] = player;
    const win = checkWin(r, c, player);
    board[r][c] = EMPTY;
    return !!win;
  }

  // ============== 评估：单点位的启发式"潜在威胁/机会" ==============
  // 对指定玩家，若在该点落子，得到的四方向连子潜力分（粗估）
  function scorePoint(r, c, player) {
    let score = 0;
    for (const [dr, dc] of DIRS) {
      score += linePotential(r, c, dr, dc, player);
    }
    return score;
  }

  function linePotential(r, c, dr, dc, player) {
    // 以 (r,c) 为中心，统计该直线上 9 格窗口中同色棋子数 + 两端是否开放
    // 这是一个快速估算，用于候选点排序
    let stones = 0;
    let openEnds = 0;
    // 正方向延伸
    let countFwd = 0;
    let nr = r + dr, nc = c + dc;
    while (inRange(nr, nc) && board[nr][nc] === player && countFwd < 4) {
      countFwd++; nr += dr; nc += dc;
    }
    if (inRange(nr, nc) && board[nr][nc] === EMPTY) openEnds++;
    // 反方向延伸
    let countBwd = 0;
    nr = r - dr; nc = c - dc;
    while (inRange(nr, nc) && board[nr][nc] === player && countBwd < 4) {
      countBwd++; nr -= dr; nc -= dc;
    }
    if (inRange(nr, nc) && board[nr][nc] === EMPTY) openEnds++;
    stones = countFwd + countBwd + 1; // 假设在 (r,c) 落子

    // 评分表（五子棋常用启发式）
    if (stones >= 5) return 100000;
    if (stones === 4) return openEnds === 2 ? 10000 : (openEnds === 1 ? 1000 : 0);
    if (stones === 3) return openEnds === 2 ? 1000 : (openEnds === 1 ? 100 : 0);
    if (stones === 2) return openEnds === 2 ? 100 : (openEnds === 1 ? 10 : 0);
    if (stones === 1) return openEnds === 2 ? 10 : (openEnds === 1 ? 1 : 0);
    return 0;
  }

  // ============== 评估：整体盘面对指定玩家的"静态评分" ==============
  // 扫描四个方向所有线，统计连子 + 两端 open/blocked
  // 计分表：活五=100000；活四/双冲四=10000；冲四=1000；活三=1000；眠三=100；活二=100；眠二=10
  function evaluateBoardFor(player) {
    const opp = OPP(player);
    let myScore = 0;
    let oppScore = 0;

    // 行
    for (let r = 0; r < BOARD_SIZE; r++) {
      myScore += scanLine(r, 0, 0, 1, player);
      oppScore += scanLine(r, 0, 0, 1, opp);
    }
    // 列
    for (let c = 0; c < BOARD_SIZE; c++) {
      myScore += scanLine(0, c, 1, 0, player);
      oppScore += scanLine(0, c, 1, 0, opp);
    }
    // ↘ 对角线（包含主对角线及其上下）
    for (let k = 0; k < BOARD_SIZE; k++) {
      myScore += scanLine(0, k, 1, 1, player);
      oppScore += scanLine(0, k, 1, 1, opp);
      if (k !== 0) {
        myScore += scanLine(k, 0, 1, 1, player);
        oppScore += scanLine(k, 0, 1, 1, opp);
      }
    }
    // ↗ 反对角线
    for (let k = 0; k < BOARD_SIZE; k++) {
      myScore += scanLine(0, k, 1, -1, player);
      oppScore += scanLine(0, k, 1, -1, opp);
      if (k !== 0) {
        myScore += scanLine(k, BOARD_SIZE - 1, 1, -1, player);
        oppScore += scanLine(k, BOARD_SIZE - 1, 1, -1, opp);
      }
    }

    return myScore - oppScore * 1.1;
  }

  function scanLine(startR, startC, dr, dc, player) {
    // 直接在 board 上扫描该方向，避免临时数组
    let score = 0;
    // 先计算整条线长度
    let len = 0;
    {
      let rr = startR, cc = startC;
      while (inRange(rr, cc)) { len++; rr += dr; cc += dc; }
    }
    if (len < 5) return 0;

    let r = startR, c = startC;
    let i = 0;
    while (i < len) {
      const cellVal = board[r][c];
      if (cellVal !== player) { i++; r += dr; c += dc; continue; }
      // 找到一段 player 连续子
      let j = i;
      let rr = r, cc = c;
      while (j < len && board[rr][cc] === player) { j++; rr += dr; cc += dc; }
      const segLen = j - i;
      // 左端点：i - 1 位置
      const leftR = r - dr, leftC = c - dc;
      const leftOpen = inRange(leftR, leftC) && board[leftR][leftC] === EMPTY;
      // 右端点：j 位置
      const rightOpen = inRange(rr, cc) && board[rr][cc] === EMPTY;
      const openEnds = (leftOpen ? 1 : 0) + (rightOpen ? 1 : 0);

      if (segLen >= 5) {
        score += 100000;
      } else if (segLen === 4) {
        if (openEnds === 2) score += 10000;        // 活四
        else if (openEnds === 1) score += 1000;     // 冲四
      } else if (segLen === 3) {
        if (openEnds === 2) score += 1000;         // 活三（近似）
        else if (openEnds === 1) score += 100;      // 眠三
      } else if (segLen === 2) {
        if (openEnds === 2) score += 100;          // 活二
        else if (openEnds === 1) score += 10;       // 眠二
      } else if (segLen === 1) {
        if (openEnds === 2) score += 5;
      }
      i = j; r = rr; c = cc;
    }
    return score;
  }

  // ============== 重开 ==============
  function restart() {
    clearAITimer();
    board = createBoard();
    history = [];
    currentPlayer = BLACK;
    gameOver = false;
    winLine = null;
    lastMove = null;
    aiBusy = false;
    hideOverlay();
    updateStatus();
    draw();
    // 若 AI 模式且玩家执白，则 AI 先下
    if (gameMode === 'ai' && humanSide === WHITE) {
      scheduleAIMove();
    }
  }

  // ============== 绘制 ==============
  function draw() {
    const w = canvas.width / dpr;
    const h = canvas.height / dpr;
    const styles = window.getComputedStyle(document.body);
    const c1 = styles.getPropertyValue('--board-a').trim() || '#efc28a';
    const c2 = styles.getPropertyValue('--board-b').trim() || '#cf9960';
    const lineColor = styles.getPropertyValue('--board-line').trim() || 'rgba(70, 40, 10, 0.85)';
    const starColor = styles.getPropertyValue('--board-star').trim() || 'rgba(40, 20, 5, 0.9)';
    const borderColor = styles.getPropertyValue('--board-border').trim() || 'rgba(50, 25, 5, 0.95)';

    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, c1);
    grad.addColorStop(1, c2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = lineColor;
    ctx.lineWidth = Math.max(1, cell * 0.035);
    ctx.lineCap = 'round';
    for (let i = 0; i < BOARD_SIZE; i++) {
      const p = padding + i * cell;
      ctx.beginPath();
      ctx.moveTo(padding, p);
      ctx.lineTo(padding + cell * (BOARD_SIZE - 1), p);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p, padding);
      ctx.lineTo(p, padding + cell * (BOARD_SIZE - 1));
      ctx.stroke();
    }

    ctx.strokeStyle = borderColor;
    ctx.lineWidth = Math.max(1.5, cell * 0.07);
    ctx.strokeRect(padding - ctx.lineWidth / 2, padding - ctx.lineWidth / 2,
                   cell * (BOARD_SIZE - 1) + ctx.lineWidth,
                   cell * (BOARD_SIZE - 1) + ctx.lineWidth);

    const stars = [[3, 3], [3, 11], [7, 7], [11, 3], [11, 11]];
    ctx.fillStyle = starColor;
    for (const [r, c] of stars) {
      ctx.beginPath();
      ctx.arc(padding + c * cell, padding + r * cell, Math.max(2, cell * 0.07), 0, Math.PI * 2);
      ctx.fill();
    }

    for (let r = 0; r < BOARD_SIZE; r++) {
      for (let c = 0; c < BOARD_SIZE; c++) {
        if (board[r][c] !== EMPTY) drawStone(r, c, board[r][c]);
      }
    }

    if (lastMove) {
      const { row, col } = lastMove;
      const cx = padding + col * cell;
      const cy = padding + row * cell;
      ctx.strokeStyle = board[row][col] === BLACK ? '#ff5a5a' : '#e33';
      ctx.lineWidth = Math.max(1.5, cell * 0.06);
      ctx.beginPath();
      ctx.arc(cx, cy, cell * 0.18, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (winLine) {
      const x1 = padding + winLine.c1 * cell;
      const y1 = padding + winLine.r1 * cell;
      const x2 = padding + winLine.c2 * cell;
      const y2 = padding + winLine.r2 * cell;
      ctx.strokeStyle = 'rgba(220, 40, 40, 0.9)';
      ctx.lineWidth = Math.max(2, cell * 0.1);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
  }

  function drawStone(r, c, player) {
    const cx = padding + c * cell;
    const cy = padding + r * cell;
    const radius = cell * 0.45;

    ctx.save();
    ctx.shadowColor = 'rgba(0, 0, 0, 0.35)';
    ctx.shadowBlur = Math.max(2, cell * 0.08);
    ctx.shadowOffsetX = Math.max(1, cell * 0.03);
    ctx.shadowOffsetY = Math.max(2, cell * 0.06);

    const g = ctx.createRadialGradient(
      cx - radius * 0.35, cy - radius * 0.4, radius * 0.1,
      cx, cy, radius
    );
    if (player === BLACK) {
      g.addColorStop(0, '#6a6a6a');
      g.addColorStop(0.5, '#1a1a1a');
      g.addColorStop(1, '#000');
    } else {
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.7, '#e8e8e8');
      g.addColorStop(1, '#b8b8b8');
    }
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    const hi = ctx.createRadialGradient(
      cx - radius * 0.4, cy - radius * 0.45, 0,
      cx - radius * 0.4, cy - radius * 0.45, radius * 0.6
    );
    hi.addColorStop(0, player === BLACK ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.8)');
    hi.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hi;
    ctx.beginPath();
    ctx.arc(cx - radius * 0.15, cy - radius * 0.25, radius * 0.8, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // ============== 初始化 ==============
  setupCanvas();
  updateStatus();
  // 初始情况下，若玩家选"我执白"则AI需先下天元
  if (gameMode === 'ai' && humanSide === WHITE) {
    scheduleAIMove();
  }
})();
</script>
